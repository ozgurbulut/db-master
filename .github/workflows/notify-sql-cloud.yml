name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Sadece son commit'i değil, bir öncekini de çek ki diff alabilsin

      - name: Get Merged SQL Files
        id: files
        run: |
          # Değişen dosyaları bulur, .sql olanları filtreler
          SQL_FILES=$(git diff --name-only HEAD^ HEAD | grep '\.sql$' | xargs)
          echo "found_files=$SQL_FILES" >> $GITHUB_OUTPUT

      - name: Notify Local API
        if: steps.files.outputs.found_files != ''
        run: |
          # Commit mesajından JIRA ID çek
          ISSUE_KEY=$(git log -1 --pretty=%B | grep -oE '[A-Z]+-[0-9]+' | head -1)
          
          if [ -z "$ISSUE_KEY" ]; then
            ISSUE_KEY="N/A"
          fi

          echo "Gönderilen Veri: issue_key=$ISSUE_KEY, files=${{ steps.files.outputs.found_files }}"

          # JSON anahtarlarını C# sınıfındaki [JsonPropertyName] etiketlerine göre küçülttük
          curl -X POST "https://unmindful-vanna-untrig.ngrok-free.dev/api/GitHubWebhook/merge-notification" \
          -H "Content-Type: application/json" \
          -d "{\"issue_key\": \"$ISSUE_KEY\", \"files\": \"${{ steps.files.outputs.found_files }}\"}"
