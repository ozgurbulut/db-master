name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Merged SQL Files
        id: files
        run: |
          # Değişen dosyalar arasından sadece .sql olanları filtreler
          SQL_FILES=$(git diff --name-only HEAD^ HEAD | grep '\.sql$' | xargs)
          echo "found_files=$SQL_FILES" >> $GITHUB_OUTPUT

      - name: Notify Local API
        if: steps.files.outputs.found_files != ''
        run: |
          # Commit mesajından JIRA ID çek (Örn: SCRUM-13)
          ISSUE_KEY=$(git log -1 --pretty=%B | grep -oE '[A-Z]+-[0-9]+' | head -1)
          
          # JIRA ID bulunamazsa varsayılan bir değer atayalım (Opsiyonel)
          if [ -z "$ISSUE_KEY" ]; then
            ISSUE_KEY="N/A"
          fi

          echo "Gönderilen Veri: IssueKey=$ISSUE_KEY, Files=${{ steps.files.outputs.found_files }}"

          # ngrok adresi ve doğru Controller yolu (GitHubWebhook)
          curl -X POST "https://unmindful-vanna-untrig.ngrok-free.dev/api/GitHubWebhook/merge-notification" \
          -H "Content-Type: application/json" \
          -d "{\"IssueKey\": \"$ISSUE_KEY\", \"Files\": \"${{ steps.files.outputs.found_files }}\"}"
