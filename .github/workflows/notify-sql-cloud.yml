name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çek ki dosya farklarını kesin bulsun

      - name: Get Merged SQL Files
        id: files
        run: |
          # Son commit ile gelen .sql dosyalarını kesin bulur
          SQL_FILES=$(git show --name-only --format="" HEAD | grep '\.sql$' | xargs)
          echo "found_files=$SQL_FILES" >> $GITHUB_OUTPUT
          echo "Bulunan SQL Dosyalari: $SQL_FILES"

      - name: Notify Local API
        # Eğer dosya bulunamazsa bile zorla çalıştıralım ki loglarda ne olduğunu görelim
        # if: steps.files.outputs.found_files != '' (Bu satırı kaldırdım, her durumda çalışsın)
        run: |
          # Commit mesajından JIRA ID'yi çek
          ISSUE_KEY=$(git log -1 --pretty=%B | grep -oE '[A-Z]+-[0-9]+' | head -1)
          
          # Eğer bilet bulunamazsa varsayılan SCRUM-15 (veya N/A) ata
          if [ -z "$ISSUE_KEY" ]; then
            ISSUE_KEY="SCRUM-15"
          fi

          echo "Gonderilen Veri: issue_key=$ISSUE_KEY, files=${{ steps.files.outputs.found_files }}"

          # Tek satırda temiz JSON gönderimi
          curl -X POST "https://unmindful-vanna-untrig.ngrok-free.dev/api/GitHubWebhook/merge-notification" \
          -H "Content-Type: application/json" \
          -d "{\"issue_key\": \"$ISSUE_KEY\", \"files\": \"${{ steps.files.outputs.found_files }}\"}"
