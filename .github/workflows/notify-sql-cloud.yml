name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main # Sadece ana dala merge/push olduğunda çalışır

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Değişen SQL Dosyalarını Bul
        id: files
        run: |
          # Son merge ile gelen .sql dosyalarını bulur
          SQL_FILES=$(git diff --name-only HEAD^ HEAD | grep '\.sql$' | xargs)
          echo "found_files=$SQL_FILES" >> $GITHUB_OUTPUT

      - name: SQL Cloud'a Bildir
        if: steps.files.outputs.found_files != ''
        run: |
          # Burada senin lokaldeki veya sunucudaki API'ne haber veriyoruz
          # Örnek: SCRUM bilet numarasını branch isminden veya commit'ten çekebiliriz
          curl -X POST "https://senin-api-adresin.com/update-change-set" \
          -d "files=${{ steps.files.outputs.found_files }}"
