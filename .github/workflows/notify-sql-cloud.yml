name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Signal to Backend
        run: |
          COMMIT_SHA="${{ github.sha }}"
          USER_NAME="${{ github.actor }}"
          # Mesajdan JIRA ID çek, yoksa varsayılan ata
          ISSUE_KEY=$(git log -1 --pretty=%B | grep -oE '[A-Z]+-[0-9]+' | head -1 || echo "SCRUM-15")

          curl -X POST "https://unmindful-vanna-untrig.ngrok-free.dev/api/GitHubWebhook/merge-notification" \
          -H "Content-Type: application/json" \
          -d "{\"issue_key\": \"$ISSUE_KEY\", \"commit_sha\": \"$COMMIT_SHA\", \"user_name\": \"$USER_NAME\"}"
