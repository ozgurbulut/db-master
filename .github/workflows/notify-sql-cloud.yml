name: Notify SQL Cloud on Merge
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Get Merged SQL Files
        id: files
        run: |
          # .sql dosyalarını bul ve listele
          SQL_FILES=$(git show --name-only --format="" HEAD | grep '\.sql$' | xargs)
          echo "found_files=$SQL_FILES" >> $GITHUB_OUTPUT
          echo "Bulunan SQL Dosyalari: $SQL_FILES"

      - name: Notify Local API
        run: |
          # JIRA ID çek
          ISSUE_KEY=$(git log -1 --pretty=%B | grep -oE '[A-Z]+-[0-9]+' | head -1)
          
          if [ -z "$ISSUE_KEY" ]; then
            ISSUE_KEY="SCRUM-15"
          fi

          # Değişkenleri güvenli formatta hazırla
          FILES="${{ steps.files.outputs.found_files }}"
          
          echo "Gonderilecek Veri: issue_key=$ISSUE_KEY, files=$FILES"

          # 400 hatasını önlemek için en güvenli JSON gönderim formatı
          curl -X POST "https://unmindful-vanna-untrig.ngrok-free.dev/api/GitHubWebhook/merge-notification" \
          -H "Content-Type: application/json" \
          -d "{\"issue_key\": \"$ISSUE_KEY\", \"files\": \"$FILES\"}"
